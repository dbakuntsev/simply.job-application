<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simply Job Application</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=6FCC573284BCBFE07F364A8FD15268D031E09D5C18C3A73108C51071D3414D06" />
    <script>
        // GitHub Pages SPA redirect: rewrite ?/path back to /path
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));
    </script>
</head>
<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3" style="display:none">
        An unhandled error occurred.
        <a href="" class="alert-link">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
