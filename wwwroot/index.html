<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simply Opportunity Tracker</title>
    <base href="/" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Simply OT" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=274E7E0741ACC34C4900F320D422580FC52BF5D626C0A5288801467151B43858" />
    <link rel="stylesheet" href="_content/Radzen.Blazor/css/default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" integrity="sha512-nMNlpuaDPrqlEls3IX/Q56H36qvBASwb3ipuo3MxeWbsQB1881ox0cRv7UPTgBlriqoynt35KjEwgGUeUXIPnw==" crossorigin="anonymous" />
    <script>
        // GitHub Pages SPA redirect: rewrite ?/path back to /path
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));

        // Capture beforeinstallprompt early — before Blazor and pwa.js load.
        // pwa.js reads window.__pwaInstallPrompt and registers __pwaInstallPromptCallback.
        window.__pwaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            window.__pwaInstallPrompt = e;
            if (window.__pwaInstallPromptCallback) window.__pwaInstallPromptCallback();
        });
        window.addEventListener('appinstalled', function () {
            window.__pwaInstallPrompt = null;
            if (window.__pwaInstalledCallback) window.__pwaInstalledCallback();
        });
    </script>
</head>
<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3" style="display:none">
        An unhandled error occurred.
        <a href="" class="alert-link">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="js/app.js?v=CF31EA6F65318E3BE127D77932CBCF97DF7BB80FC649E911FC07F0D8295B5648"></script>
    <!-- Radzen Blazor JS (required for Radzen component interop) -->
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <!-- Monaco Editor — follow the documented BlazorMonaco load order:
         1. jsInterop.js  (installs window.require as a plain config object + blazorMonaco API)
         2. Override the vs path from the default local _content/… to the CDN URL
         3. loader.min.js  (reads window.require config object, sets up AMD)
         4. editor.main.js as a direct <script> tag — this defines window.monaco synchronously.
            AMD require(['vs/editor/editor.main']) is NOT equivalent; it races with component
            creation. A direct <script> tag resolves before Blazor WASM starts.
         WARNING: Do NOT enable Blazor enhanced navigation on pages hosting Monaco editors
                  (not applicable in pure WASM). -->
    <!-- jQuery + Select2 must load before Monaco's AMD loader so Select2 registers
         as a plain jQuery plugin rather than attempting AMD module resolution. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js" integrity="sha512-2ImtlRlf2VVmiGZsjm9bEyhjGW4dU7B6TNwh/hx/iSByxNENtj3WVE6o/9Lj4TJeVXPi4bnOIMXFIJJAeufa0A==" crossorigin="anonymous"></script>
    <script src="js/select2interop.js"></script>
    <script src="_content/BlazorMonaco/jsInterop.js"></script>
    <script>require.paths.vs = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js" integrity="sha512-ZG31AN9z/CQD1YDDAK4RUAvogwbJHv6bHrumrnMLzdCrVu4HeAqrUX7Jsal/cbUwXGfaMUNmQU04tQ8XXl5Znw==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/editor/editor.main.js" integrity="sha512-Cd0FcDNMbrE3B7q3TuC3rK7HXtHENbHyR+O+tN4sDlHL/V/M34lHkHak0Vg8Ymg3/Bxt+R88RGBgD3t3OaTzUQ==" crossorigin="anonymous"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Register service worker for PWA support (production only — the dev stub is a no-op).
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .catch(function (err) { console.warn('[PWA] Service worker registration failed:', err); });
        }
    </script>
</body>
</html>
