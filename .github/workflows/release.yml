name: Release

on:
  release:
    types: [published]
    
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest   # PowerShell required by the MSBuild cache-buster target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Zip artifact
        run: Compress-Archive -Path ./publish/wwwroot/* -DestinationPath simply-job-application-${{ github.ref_name }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: simply-job-application-${{ github.ref_name }}.zip
          generate_release_notes: true
