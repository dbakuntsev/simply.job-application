name: Deploy to GitHub Pages

on:
  release:
    types: [published]
    
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: windows-latest   # PowerShell required by the MSBuild cache-buster target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      # GitHub Pages serves project repos under /<repo>/, so the base href must
      # match.  We patch the published index.html after dotnet publish so the
      # cache-buster hashes are already in place before we touch the file.
      - name: Fix base href
        shell: pwsh
        run: |
          $repo  = "${{ github.repository }}".Split('/')[1]
          $file  = "./publish/wwwroot/index.html"
          $html  = Get-Content $file -Raw -Encoding UTF8
          $html  = $html -replace '<base href="/" />', "<base href=`"/$repo/`" />"
          [IO.File]::WriteAllText($file, $html, [Text.Encoding]::UTF8)

      # Stamp the release tag into the manifest so Windows Apps list shows the
      # correct version.  Strips a leading 'v' (v1.2.3 → 1.2.3).
      - name: Stamp version into manifest
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          $file    = "./publish/wwwroot/manifest.webmanifest"
          $content = Get-Content $file -Raw -Encoding UTF8
          $content = $content -replace '"version":\s*"[^"]*"', ('"version": "' + $version + '"')
          [IO.File]::WriteAllText($file, $content, [Text.Encoding]::UTF8)

      # dotnet publish computes SHA-256 hashes for every asset and writes them
      # into service-worker-assets.js.  The two steps above modify index.html
      # and manifest.webmanifest AFTER those hashes are computed, so the hashes
      # are now stale.  The production SW passes each hash as an SRI integrity
      # value when pre-caching; a mismatch causes a hard install failure.
      # Re-compute and patch just the two affected entries here.
      - name: Patch SW asset hashes for modified files
        shell: pwsh
        run: |
          function Update-SwHash($assetsJs, $url, $filePath) {
              $bytes  = [IO.File]::ReadAllBytes($filePath)
              $hash   = [Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
              $sri    = 'sha256-' + [Convert]::ToBase64String($hash)
              $js     = Get-Content $assetsJs -Raw -Encoding UTF8
              $escaped = [Regex]::Escape($url)
              # Matches the hash value immediately before the url key for this asset.
              $js     = $js -replace "(?<=""hash"":"")[^""]*(?="",""url"":""$escaped"")", $sri
              [IO.File]::WriteAllText($assetsJs, $js, [Text.Encoding]::UTF8)
          }
          $base = './publish/wwwroot'
          Update-SwHash "$base/service-worker-assets.js" 'index.html'           "$base/index.html"
          Update-SwHash "$base/service-worker-assets.js" 'manifest.webmanifest' "$base/manifest.webmanifest"

      # Jekyll (the default Pages processor) silently drops folders whose names
      # start with an underscore — which includes _framework where the Blazor
      # runtime lives.  An empty .nojekyll file disables Jekyll entirely.
      - name: Add .nojekyll
        shell: pwsh
        run: New-Item -ItemType File -Path ./publish/wwwroot/.nojekyll -Force | Out-Null

      # GitHub Pages returns a 404 for any URL that does not map to a real file
      # (e.g. /evaluate, /history).  Serving index.html as 404.html lets the
      # Blazor router handle those navigations on the client side.
      - name: Create 404.html for SPA routing
        shell: pwsh
        run: Copy-Item ./publish/wwwroot/index.html ./publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
